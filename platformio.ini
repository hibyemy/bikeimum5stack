[env:m5stack-core2]
platform = espressif32
board = m5stack-core2
framework = arduino
lib_deps =
    m5stack/M5Core2@^0.1.9
    greiman/SdFat@^2.2.2
    mikalhart/TinyGPSPlus@^1.0.3
monitor_speed = 115200
upload_speed = 115200
build_unflags = -std=gnu++11
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -std=gnu++17
